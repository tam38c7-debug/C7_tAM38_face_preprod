services:


  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8989:80"
    volumes:
      - ./frontend/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/certbot/www:/var/www/certbot:ro
    networks:
      - app-network


  strapi_start:
    build:
      context: ./strapi_cms
      dockerfile: Dockerfile_production
    ports:
      - "1337:1337"
    environment:
      - NODE_ENV=production
      - JWT_SECRET=FG11nnvcxIWCL5pKIXnH00Px4X0FX+xpomx0YRKRYfc=
